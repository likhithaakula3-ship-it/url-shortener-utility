<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener Utility</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>URL Shortener Utility</h1>

    <div class="card">
        <input
            type="url"
            id="longUrl"
            placeholder="Enter Long URL"
        >

        <button onclick="shortenURL()">
            Generate Short URL
        </button>

        <div id="result"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
